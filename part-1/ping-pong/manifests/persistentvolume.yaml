# Local PersistentVolume for ping-pong counter (ex 1.11).
# On k3d you must create the host path on the node first, e.g.:
#   docker exec k3d-devops-agent-0 mkdir -p /tmp/kube
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ping-pong-pv
spec:
  storageClassName: manual
  capacity:
    storage: 100Mi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /tmp/kube
