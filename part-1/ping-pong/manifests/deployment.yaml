apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong-dep
  labels:
    app: ping-pong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong
  template:
    metadata:
      labels:
        app: ping-pong
    spec:
      volumes:
        - name: ping-pong-storage
          persistentVolumeClaim:
            claimName: ping-pong-pvc
      containers:
        - name: ping-pong
          image: ghcr.io/maxim955827848/ping-pong:1.0
          env:
            - name: PORT
              value: "3000"
            - name: DATA_DIR
              value: /usr/src/app/data
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: ping-pong-storage
              mountPath: /usr/src/app/data
