# Shared Ingress for the "exercises" apps (ex 1.07 log-output, ex 1.09 ping-pong).
# Routes:  http://localhost/        -> log-output reader
#          http://localhost/pingpong -> ping-pong
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: exercises-ingress
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: log-output-svc
                port:
                  number: 2345
          - path: /pingpong
            pathType: Prefix
            backend:
              service:
                name: ping-pong-svc
                port:
                  number: 2346
