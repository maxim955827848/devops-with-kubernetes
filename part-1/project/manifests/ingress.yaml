# Ingress for the project (ex 1.08). Served at the host root.
# If you run this on the same cluster as the exercises ingress, give the project
# its own host (e.g. project.localhost) to avoid a path clash with log-output.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: project-ingress
spec:
  rules:
    - host: project.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: project-svc
                port:
                  number: 2347
