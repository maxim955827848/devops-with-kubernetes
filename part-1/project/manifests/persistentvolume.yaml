# PersistentVolume for the project's cached image + todos (ex 1.12, 1.13).
# On k3d create the host path first:
#   docker exec k3d-devops-agent-0 mkdir -p /tmp/kube-project
apiVersion: v1
kind: PersistentVolume
metadata:
  name: project-pv
spec:
  storageClassName: manual
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /tmp/kube-project
