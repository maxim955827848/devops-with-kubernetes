# ex 3.04 + 3.05 — dynamic preview environments per pull request.
#   opened/updated PR -> deploy into a branch-specific namespace
#   closed/merged PR  -> delete that namespace and all its resources
name: PR preview environment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

env:
  GKE_CLUSTER: dwk-cluster
  GKE_ZONE: europe-north1-b
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GKE_SA_KEY }}
      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Compute namespace
        run: echo "NS=project-pr-${{ github.event.number }}" >> "$GITHUB_ENV"

      # ex 3.05 — tear down when the PR is closed/merged
      - name: Tear down preview namespace
        if: github.event.action == 'closed'
        run: kubectl delete namespace "$NS" --ignore-not-found

      # ex 3.04 — build, push, and deploy into the preview namespace
      - name: Log in to GHCR
        if: github.event.action != 'closed'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build, push, deploy preview
        if: github.event.action != 'closed'
        run: |
          TAG=${GITHUB_SHA::8}
          kubectl create namespace "$NS" --dry-run=client -o yaml | kubectl apply -f -
          docker build -t "$IMAGE_PREFIX/project-backend:$TAG"  part-2/project/backend  && docker push "$IMAGE_PREFIX/project-backend:$TAG"
          docker build -t "$IMAGE_PREFIX/project-frontend:$TAG" part-2/project/frontend && docker push "$IMAGE_PREFIX/project-frontend:$TAG"
          # apply project manifests into the preview namespace, overriding the image tags
          kubectl apply -n "$NS" -f part-2/project/manifests/
          kubectl set image deployment/project-backend-dep  backend=$IMAGE_PREFIX/project-backend:$TAG   -n "$NS"
          kubectl set image deployment/project-frontend-dep frontend=$IMAGE_PREFIX/project-frontend:$TAG -n "$NS"
