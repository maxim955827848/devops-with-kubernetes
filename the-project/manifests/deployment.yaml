# Exercise 1.4 "The project, second part"
# Replace <DOCKERHUB_USER> with your Docker Hub username (or import the local image into k3d).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: the-project-dep
  labels:
    app: the-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: the-project
  template:
    metadata:
      labels:
        app: the-project
    spec:
      containers:
        - name: the-project
          image: <DOCKERHUB_USER>/the-project:1.0
          ports:
            - containerPort: 3000
