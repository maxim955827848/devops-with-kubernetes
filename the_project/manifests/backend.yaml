apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-backend-dep
  namespace: project
  labels:
    app: project-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-backend
  template:
    metadata:
      labels:
        app: project-backend
      # ex 4.03 / 4.05 — let Prometheus scrape /metrics on the app port.
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          image: ghcr.io/maxim955827848/project-backend:2.0
          ports:
            - containerPort: 3001
          # ex 3.08 / 3.09 — requests let the scheduler place the pod and let the
          # HPA (ex 3.10) compute CPU utilization; limits cap usage.
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          env:
            - name: PORT
              value: "3001"
            # ex 4.06 — publish todos.created to NATS (deployed in the_project/messaging).
            # Best-effort: backend still runs if the broker is absent.
            - name: NATS_URL
              value: nats://nats:4222
            - name: PGHOST
              value: postgres-svc
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              valueFrom: { secretKeyRef: { name: postgres-secret, key: POSTGRES_USER } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: postgres-secret, key: POSTGRES_PASSWORD } }
            - name: PGDATABASE
              valueFrom: { secretKeyRef: { name: postgres-secret, key: POSTGRES_DB } }
---
apiVersion: v1
kind: Service
metadata:
  name: project-backend-svc
  namespace: project
spec:
  type: ClusterIP
  selector:
    app: project-backend
  ports:
    - port: 3001
      targetPort: 3001
