# ex 2.04 — route external traffic into the project namespace (frontend).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: project-ingress
  namespace: project
spec:
  rules:
    - host: project.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: project-frontend-svc
                port:
                  number: 2347
