# ex 2.07 — DB credentials. COPY this to postgres-secret.yaml, change the values,
# and apply it. postgres-secret.yaml is gitignored so real creds never get committed.
#   cp postgres-secret.example.yaml postgres-secret.yaml
#   kubectl apply -f postgres-secret.yaml -n exercises
#   kubectl apply -f postgres-secret.yaml -n project
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_USER: appuser
  POSTGRES_PASSWORD: change-me
  POSTGRES_DB: appdb
