apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong-dep
  namespace: exercises
  labels:
    app: ping-pong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong
  template:
    metadata:
      labels:
        app: ping-pong
    spec:
      containers:
        - name: ping-pong
          image: <DOCKERHUB_USER>/ping-pong:2.0
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: PGHOST
              value: postgres-svc
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              valueFrom:
                secretKeyRef: { name: postgres-secret, key: POSTGRES_USER }
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef: { name: postgres-secret, key: POSTGRES_PASSWORD }
            - name: PGDATABASE
              valueFrom:
                secretKeyRef: { name: postgres-secret, key: POSTGRES_DB }
            - name: SECRET_TOKEN
              valueFrom:
                secretKeyRef: { name: ping-pong-secret, key: SECRET_TOKEN }
